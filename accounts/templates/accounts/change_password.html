<body class="account-page"><a
        href="https://dreamspos.dreamstechnologies.com/cdn-cgi/content?id=QNmGlycwzkBSGKF9mAzZ5fikI7bVgxb1qHuDQg5x4KM-1772176821.2671432-1.0.1.1-bQJNZ.wB3_BTGRikK7NhbIMDXGCqzTLQgc2BmQ4FvYU"
        aria-hidden="true" rel="nofollow noopener" style="display: none !important; visibility: hidden !important"></a>



    <!-- Main Wrapper -->
    <div class="main-wrapper">
        <div class="account-content">
            <div class="login-wrapper reset-pass-wrap bg-img">
                <div class="login-content authent-content">
                    <form method="post">
                        {% csrf_token %}
                        {{ form.non_field_errors }}
                        <div class="login-userset">
                            <div class="login-logo logo-normal">
                                <img src="{% static 'assets/img/logo.svg' %}" alt="img">
                            </div>
                            <a href="index.html" class="login-logo logo-white">
                                <img src="{% static 'assets/img/logo-white.svg' %}" alt="Img">
                            </a>
                            <div class="login-userheading">
                                <h3>Reset password?</h3>
                                <h4>Enter New Password & Confirm Password to get inside</h4>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Old Password <span class="text-danger"> *</span></label>
                                <div class="pass-group">
                                    <input type="password" name="current_password" class="pass-input form-control">
                                    <span class="ti toggle-password ti-eye-off text-gray-9"></span>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">New Password <span class="text-danger"> *</span></label>
                                <div class="pass-group">
                                    <input type="password" name="new_password" class="pass-inputs form-control">
                                    <span class="ti toggle-passwords ti-eye-off text-gray-9"></span>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Confirm Password <span class="text-danger"> *</span></label>
                                <div class="pass-group">
                                    <input type="password" name="confirm_password" class="pass-inputa form-control">
                                    <span class="ti toggle-passworda ti-eye-off text-gray-9"></span>
                                </div>
                            </div>
                            <div class="form-login">
                                <button type="submit" class="btn btn-login">Change Password</button>
                            </div>
                            <div class="signinform text-center">
                                <h4>Return to <a href="{% url 'accounts:login' %}" class="hover-a"> login </a></h4>
                            </div>
                            <div class="my-4 d-flex justify-content-center align-items-center copyright-text">
                                <p>Copyright &copy; 2025 DreamsPOS</p>
                            </div>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
    <!-- /Main Wrapper -->


    <!-- jQuery -->
    <script src="{% static 'assets/js/jquery-3.7.1.min.js' %}" type="3a526e94b8ebf5935780b907-text/javascript"></script>

        type="3a526e94b8ebf5935780b907-text/javascript"></script>

    <!-- Custom JS -->
    <script src="{% static 'assets/js/script.js' %}" type="3a526e94b8ebf5935780b907-text/javascript"></script>
