<!DOCTYPE html>
{% load static %}
<html lang="en" data-layout-mode="light_mode">

<head>
    <!-- Meta -->
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dreams POS - Admin Dashboard</title>

    <!-- Favicon -->
    <link rel="shortcut icon" href="{% static 'assets/img/favicon.png' %}">

    <!-- ================= CSS ================= -->

    <!-- Bootstrap -->
    <link rel="stylesheet" href="{% static 'assets/css/bootstrap.min.css' %}">

    <!-- Datatable -->
    <link rel="stylesheet" href="{% static 'assets/css/dataTables.bootstrap5.min.css' %}">

    <!-- Animate -->
    <link rel="stylesheet" href="{% static 'assets/css/animate.css' %}">

    <!-- Feather -->
    <link rel="stylesheet" href="{% static 'assets/css/feather.css' %}">

    <!-- Select2 -->
    <link rel="stylesheet" href="{% static 'assets/plugins/select2/css/select2.min.css' %}">

    <!-- Fontawesome -->
    <link rel="stylesheet" href="{% static 'assets/plugins/fontawesome/css/fontawesome.min.css' %}">
    <link rel="stylesheet" href="{% static 'assets/plugins/fontawesome/css/all.min.css' %}">

    <!-- Main Style -->
    <link rel="stylesheet" href="{% static 'assets/css/style.css' %}">

    <!-- Alertify -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/alertifyjs@1.13.1/build/css/alertify.min.css" />
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/alertifyjs@1.13.1/build/css/themes/bootstrap.min.css" />

    {% block css %}{% endblock %}
</head>


<body>

    <!-- Main Wrapper -->
    <div class="main-wrapper">

        {% include 'core/includes/header.html' %}

        {% block content %}
        {% endblock %}

    </div>
    <!-- /Main Wrapper -->


    <!-- ================= JS ================= -->

    <!-- jQuery (FIRST) -->
    <script src="{% static 'assets/js/jquery-3.7.1.min.js' %}"></script>

    <!-- Bootstrap -->
    <script src="{% static 'assets/js/bootstrap.bundle.min.js' %}"></script>

    <!-- Datatable -->
    <script src="{% static 'assets/js/jquery.dataTables.min.js' %}"></script>
    <script src="{% static 'assets/js/dataTables.bootstrap5.min.js' %}"></script>

    <!-- Slimscroll -->
    <script src="{% static 'assets/js/jquery.slimscroll.min.js' %}"></script>

    <!-- Select2 -->
    <script src="{% static 'assets/plugins/select2/js/select2.min.js' %}"></script>

    <!-- Feather -->
    <script src="{% static 'assets/js/feather.min.js' %}"></script>

    <!-- Apex Chart -->
    <script src="{% static 'assets/plugins/apexchart/apexcharts.min.js' %}"></script>
    <script src="{% static 'assets/plugins/apexchart/chart-data.js' %}"></script>

    <!-- Main Script -->
    <script src="{% static 'assets/js/script.js' %}"></script>

    <!-- Alertify -->
    <script src="https://cdn.jsdelivr.net/npm/alertifyjs@1.13.1/build/alertify.min.js"></script>


    <!-- ================= Messages ================= -->

    {% if messages %}
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            alertify.set('notifier', 'position', 'top-right');

            {% for message in messages %}
                alertify.{{ message.tags }}('{{ message|escapejs }}');
            {% endfor %}
        });
    </script>
    {% endif %}


    <!-- ================= Datatable Auto Init ================= -->

    <script>
        $(document).ready(function () {

            // Auto activate all datatables
            $('.datatable').DataTable();

        });
    </script>


    {% block js %}{% endblock %}

</body>

</html>
