{% extends 'core/core_base.html' %}
{% load static %}
{% block content %}
<div class="page-wrapper">
    <div class="content">
        <div class="page-header">
            <div class="add-item d-flex">
                <div class="page-title">
                    <h4>New Stock Transfer</h4>
                    <h6>Transfer stock to another store</h6>
                </div>
            </div>
            <ul class="table-top-head">
                <li><a href="{% url 'grocery:stock_transfer_list' %}" class="btn btn-sm btn-secondary"><i
                            class="ti ti-arrow-left me-1"></i>Back</a></li>
            </ul>
        </div>
        <div class="card">
            <div class="card-body">
                <form method="post" action="{% url 'grocery:stock_transfer_create' %}">
                    {% csrf_token %}
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Product <span class="text-danger">*</span></label>
                            <select name="product" class="form-select" required>
                                <option value="">-- Select Product --</option>
                                {% for p in products %}
                                <option value="{{ p.id }}">{{ p.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Destination Store <span class="text-danger">*</span></label>
                            <select name="to_store" class="form-select" required>
                                <option value="">-- Select Store --</option>
                                {% for s in stores %}
                                <option value="{{ s.id }}">{{ s.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Quantity <span class="text-danger">*</span></label>
                            <input type="number" name="quantity" class="form-control" min="0.01" step="0.01" required>
                        </div>
                    </div>
                    <div class="d-flex gap-2 mt-2">
                        <button type="submit" class="btn btn-primary">Create Transfer</button>
                        <a href="{% url 'grocery:stock_transfer_list' %}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <div class="footer d-sm-flex align-items-center justify-content-between border-top bg-white p-3">
        <p class="mb-0 text-gray-9">2014 - 2025 &copy; InventoryHub. All Right Reserved</p>
    </div>
</div>
{% endblock %}
