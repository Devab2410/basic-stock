{% extends 'grocery/grocery_base.html' %}
{% load static %}
{% block content %}
<div class="page-wrapper">
	<div class="content">
		<div class="page-header">
			<div class="add-item d-flex">
				<div class="page-title">
					<h4>{{ action }} Product</h4>
					<h6>{{ action }} a grocery product</h6>
				</div>
			</div>
			<div class="page-btn"><a href="{% url 'grocery:product_list' %}" class="btn btn-secondary"><i
						class="ti ti-arrow-left me-1"></i>Back to Products</a></div>
		</div>
		<div class="card">
			<div class="card-body">
				<form method="post" enctype="multipart/form-data">
					{% csrf_token %}
					<div class="row">
						<div class="col-md-6">
							<div class="mb-3"><label class="form-label">Product Name <span
										class="text-danger">*</span></label><input type="text" name="name"
									class="form-control" value="{{ product.name|default:'' }}" required></div>
						</div>
						<div class="col-md-3">
							<div class="mb-3"><label class="form-label">SKU</label><input type="text" name="sku"
									class="form-control" value="{{ product.sku|default:'' }}"></div>
						</div>
						<div class="col-md-3">
							<div class="mb-3"><label class="form-label">Barcode</label><input type="text" name="barcode"
									class="form-control" value="{{ product.barcode|default:'' }}"></div>
						</div>
						<div class="col-md-4">
							<div class="mb-3"><label class="form-label">Category</label><select name="category"
									class="form-select select">
									<option value="">-- Select --</option>{% for cat in categories %}<option
										value="{{ cat.id }}" {% if product.category_id==cat.id %}selected{% endif %}>{{
										cat.name }}</option>{% endfor %}
								</select></div>
						</div>
						<div class="col-md-4">
							<div class="mb-3"><label class="form-label">Brand</label><select name="brand"
									class="form-select select">
									<option value="">-- Select --</option>{% for b in brands %}<option
										value="{{ b.id }}" {% if product.brand_id==b.id %}selected{% endif %}>{{ b.name
										}}</option>{% endfor %}
								</select></div>
						</div>
						<div class="col-md-4">
							<div class="mb-3"><label class="form-label">Unit</label><select name="unit"
									class="form-select select">
									<option value="">-- Select --</option>{% for u in units %}<option value="{{ u.id }}"
										{% if product.unit_id==u.id %}selected{% endif %}>{{ u }}</option>{% endfor %}
								</select></div>
						</div>
						<div class="col-md-3">
							<div class="mb-3"><label class="form-label">Purchase Price</label><input type="number"
									step="0.01" name="purchase_price" class="form-control"
									value="{{ product.purchase_price|default:'0' }}"></div>
						</div>
						<div class="col-md-3">
							<div class="mb-3"><label class="form-label">Selling Price</label><input type="number"
									step="0.01" name="selling_price" class="form-control"
									value="{{ product.selling_price|default:'0' }}"></div>
						</div>
						<div class="col-md-3">
							<div class="mb-3"><label class="form-label">Tax Rate (%)</label><input type="number"
									step="0.01" name="tax_rate" class="form-control"
									value="{{ product.tax_rate|default:'0' }}"></div>
						</div>
						<div class="col-md-3">
							<div class="mb-3"><label class="form-label">HSN Code</label><input type="text"
									name="hsn_code" class="form-control" value="{{ product.hsn_code|default:'' }}">
							</div>
						</div>
						<div class="col-md-3">
							<div class="mb-3"><label class="form-label">Weight</label><input type="number" step="0.001"
									name="weight" class="form-control" value="{{ product.weight|default:'0' }}"></div>
						</div>
						<div class="col-md-3">
							<div class="mb-3"><label class="form-label">Shelf Life (days)</label><input type="number"
									name="shelf_life_days" class="form-control"
									value="{{ product.shelf_life_days|default:'' }}"></div>
						</div>
						<div class="col-md-3">
							<div
								class="mb-3 status-toggle modal-status d-flex justify-content-between align-items-center">
								<span class="status-label">Perishable</span><input type="checkbox" name="is_perishable"
									id="is_perishable" class="check" {% if product.is_perishable %}checked{% endif
									%}><label for="is_perishable" class="checktoggle"></label></div>
						</div>
						<div class="col-12">
							<div class="mb-3"><label class="form-label">Description</label><textarea name="description"
									class="form-control" rows="3">{{ product.description|default:'' }}</textarea></div>
						</div>
					</div>
					<div class="d-flex gap-2">
						<button type="submit" class="btn btn-primary">{{ action }} Product</button>
						<a href="{% url 'grocery:product_list' %}" class="btn btn-secondary">Cancel</a>
					</div>
				</form>
			</div>
		</div>
	</div>
	<div class="footer d-sm-flex align-items-center justify-content-between border-top bg-white p-3">
		<p class="mb-0 text-gray-9">2014 - 2025 &copy; InventoryHub</p>
	</div>
</div>
{% endblock %}
