<!DOCTYPE html>
{% load static %}
<html lang="en" data-layout-mode="light_mode">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grocery Store - Inventory Management</title>
    <script src="{% static 'assets/js/theme-script.js' %}"></script>
    <link rel="shortcut icon" type="image/x-icon" href="{% static 'assets/img/favicon.png' %}">
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'assets/img/apple-touch-icon.png' %}">
    <link rel="stylesheet" href="{% static 'assets/css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'assets/plugins/bootstrap-tagsinput/bootstrap-tagsinput.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/bootstrap-datetimepicker.min.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/dataTables.bootstrap5.min.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/animate.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/feather.css' %}">
    <link rel="stylesheet" href="{% static 'assets/plugins/select2/css/select2.min.css' %}">
    <link rel="stylesheet" href="{% static 'assets/plugins/quill/quill.snow.css' %}">
    <link rel="stylesheet" href="{% static 'assets/plugins/tabler-icons/tabler-icons.min.css' %}">
    <link rel="stylesheet" href="{% static 'assets/plugins/fontawesome/css/fontawesome.min.css' %}">
    <link rel="stylesheet" href="{% static 'assets/plugins/fontawesome/css/all.min.css' %}">
    <link rel="stylesheet" href="{% static 'assets/plugins/%40simonwep/pickr/themes/nano.min.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/style.css' %}">
    <link rel="stylesheet" href="{% static 'stock/assets/css/owl.carousel.min.css' %}">
    <link rel="stylesheet" href="{% static 'stock/assets/plugins/summernote/summernote-bs4.min.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    {% block css %}{% endblock %}
</head>

<body>
    <div class="main-wrapper">
        {% include 'grocery/includes/grocery_hs.html' %}
        {% block content %}{% endblock %}
    </div>

    <script data-cfasync="false" src="{% static 'assets/js/email-decode.min.js' %}"></script>
    <script src="{% static 'assets/js/jquery-3.7.1.min.js' %}"></script>
    <script src="{% static 'assets/js/jquery.slimscroll.min.js' %}"></script>
    <script src="{% static 'assets/js/jquery.dataTables.min.js' %}"></script>
    <script src="{% static 'assets/plugins/mask/jquery.mask.min.js' %}"></script>
    <script src="{% static 'assets/js/bootstrap.bundle.min.js' %}"></script>
    <script src="{% static 'assets/js/feather.min.js' %}"></script>
    <script src="{% static 'assets/js/dataTables.bootstrap5.min.js' %}"></script>
    <script src="{% static 'assets/js/moment.min.js' %}"></script>
    <script src="{% static 'assets/js/bootstrap-datetimepicker.min.js' %}"></script>
    <script src="{% static 'assets/plugins/daterangepicker/daterangepicker.js' %}"></script>
    <script src="{% static 'assets/plugins/select2/js/select2.min.js' %}"></script>
    <script src="{% static 'assets/plugins/apexchart/apexcharts.min.js' %}"></script>
    <script src="{% static 'assets/plugins/apexchart/chart-data.js' %}"></script>
    <script src="{% static 'assets/plugins/quill/quill.min.js' %}"></script>
    <script src="{% static 'assets/plugins/bootstrap-tagsinput/bootstrap-tagsinput.js' %}"></script>
    <script src="{% static 'assets/plugins/%40simonwep/pickr/pickr.es5.min.js' %}"></script>
    <script src="{% static 'assets/js/theme-colorpicker.js' %}"></script>
    <script src="{% static 'assets/js/script.js' %}"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/alertifyjs@1.13.1/build/css/alertify.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/alertifyjs@1.13.1/build/css/themes/bootstrap.min.css" />
    <script src="{% static 'assets/js/rocket-loader.min.js' %}" data-cf-settings="c37b31fdc432381c3a750dfe-|49"
        defer></script>
    <script src="{% static 'stock/assets/js/owl.carousel.min.js' %}"></script>
    <script src="{% static 'stock/assets/plugins/summernote/summernote-bs4.min.js' %}"></script>
    <script src="{% static 'stock/assets/js/script.js' %}"></script>
    <script src="https://cdn.jsdelivr.net/npm/alertifyjs@1.13.1/build/alertify.min.js"></script>

    {% if messages %}
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            alertify.set('notifier', 'position', 'top-right');
            {% for message in messages %}
            alertify.{ { message.tags } } ('{{ message|escapejs }}');
            {% endfor %}
        });
    </script>
    {% endif %}
    {% block js %}{% endblock %}
</body>

</html>
